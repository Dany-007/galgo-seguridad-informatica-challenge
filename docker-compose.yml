services:
  postgres:
    image: postgres:16-alpine
    container_name: galo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Sin "ports:" hacia el host: la base de datos solo es alcanzable dentro de la red interna de
    # docker-compose (segmentacion de red / no exponer el motor de BD directamente a la maquina host).
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - galo_internal

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: galo_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - galo_internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - galo_internal
    profiles: ["tools"]
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/seed/seedUsers.js"]

  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - galo_internal
    profiles: ["tools"]
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/ingestion/runOnce.js"]

  nginx:
    image: nginx:1.27-alpine
    container_name: galo_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8443:8443"
      - "8080:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks:
      - galo_internal

networks:
  galo_internal:
    driver: bridge

volumes:
  pgdata:
