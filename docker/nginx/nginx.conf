worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # Solo TLS 1.2/1.3 (deshabilita protocolos SSL/TLS obsoletos e inseguros).
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;

  # Oculta la version de nginx en cabeceras de respuesta (reduce fingerprinting).
  server_tokens off;

  limit_req_zone $binary_remote_addr zone=perip:10m rate=20r/s;

  server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    limit_req zone=perip burst=40 nodelay;
    client_max_body_size 1m;

    location / {
      proxy_pass http://api:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 8080;
    server_name localhost;
    # Redirige cualquier intento en texto plano hacia HTTPS (no se sirve trafico sin cifrar).
    return 301 https://$host:8443$request_uri;
  }
}
